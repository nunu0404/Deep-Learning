name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy pandas pillow beautifulsoup4 scikit-image scipy opencv-python matplotlib
      - name: Run tests
        run: PYTHONPATH="$PWD/src" pytest -q
